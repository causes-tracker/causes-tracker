services:
  postgres:
    # Pin by digest; update when upgrading pgvector or PostgreSQL.
    # Current: pgvector 0.8.0 on PostgreSQL 17 (bookworm).
    # To update: docker pull pgvector/pgvector:pg17 && docker inspect --format='{{index .RepoDigests 0}}' pgvector/pgvector:pg17
    image: pgvector/pgvector:pg17@sha256:6b228f86dd833f0cd8c9ae7fa3a4fc683158894b396b51403d43678e76d90eb0
    environment:
      POSTGRES_USER: causes
      POSTGRES_PASSWORD: causes
      POSTGRES_DB: causes
    ports:
      - "5432:5432"
    volumes:
      - causes-dev-pg:/var/lib/postgresql/data

volumes:
  causes-dev-pg:
