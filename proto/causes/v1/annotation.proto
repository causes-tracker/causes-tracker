// Annotation carries structured analysis data attached to a Sign.
syntax = "proto3";

package causes.v1;

import "causes/v1/common.proto";

// Annotation carries structured or machine-generated analysis data attached to
// a Sign.  Annotations differ from Comments in that:
//
//   - They are typically machine-authored (by a connector or analysis service).
//   - Their content may be structured binary data rather than Markdown.
//   - The annotation_type field names the schema so consumers can decode content.
//
// Example: a crash-report Sign may have an Annotation of type "backtrace/v1"
// carrying the retraced backtrace and variable values produced by a retrace
// service.  Storing this as an Annotation rather than a Comment keeps structured
// analysis artifacts separate from human narrative discussion.
//
// Human narrative discussion of a Sign belongs in Comment messages with
// parent_type == PARENT_TYPE_SIGN.
//
// annotation_type follows the convention "domain/version"
// (e.g. "backtrace/v1", "heap-summary/v1", "log-context/v1").
// Well-known types are documented in the connector specification.
// Connectors and analysis services may define their own types.
message Annotation {
  enum SourceType {
    SOURCE_TYPE_UNSPECIFIED = 0;
    // SOURCE_TYPE_CONNECTOR: generated by a data-source connector or analysis service.
    SOURCE_TYPE_CONNECTOR = 1;
    // SOURCE_TYPE_HUMAN: manually authored by a person.
    SOURCE_TYPE_HUMAN = 2;
  }

  ResourceMeta meta = 1;

  // parent_id is the Sign this annotation belongs to.
  SignId parent_id = 2;
  // annotation_type identifies the content schema.
  // Convention: "domain/version" (e.g. "backtrace/v1").
  string annotation_type = 3;
  SourceType source_type = 4;
  FederatedIdentity author = 5;
  // content is the annotation payload; its schema is defined by annotation_type.
  bytes content = 6;
}
