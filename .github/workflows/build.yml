name: build
on:
  push:
    branches: [master]
  pull_request:
  merge_group:
permissions:
  contents: write
env:
  BB_FLAGS: >-
    --config=ci --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # The base image ships the deprecated gold linker, which causes warnings
      # when detected by build tools.  Remove the binaries; ld already points
      # to ld.bfd.
      - name: Remove deprecated gold linker
        run: sudo rm -f /usr/bin/x86_64-linux-gnu-ld.gold /usr/bin/ld.gold
      - name: Install Bazelisk
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-v2
          repository-cache: true
      - name: Check Rust macro usage
        run: |
          if grep -rn 'load("@rules_rs//rs:rust_\(binary\|library\|test\)\.bzl"' --include='BUILD.bazel' .; then
            echo "ERROR: Use //build:rust.bzl macros instead of @rules_rs directly."
            exit 1
          fi
      - name: Check package READMEs
        run: tools/require_readme_test.sh
      - name: Check formatting
        run: bazel run $BB_FLAGS //:format.check
      - name: Test, build docs, and check coverage
        run: tools/coverage.sh $BB_FLAGS //...
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # The base image ships the deprecated gold linker, which causes warnings
      # when detected by build tools.  Remove the binaries; ld already points
      # to ld.bfd.
      - name: Remove deprecated gold linker
        run: sudo rm -f /usr/bin/x86_64-linux-gnu-ld.gold /usr/bin/ld.gold
      - name: Install Bazelisk
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-v2
          repository-cache: true
      - name: Deploy to GitHub Pages
        run: bazel run $BB_FLAGS //docs:deploy_docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
