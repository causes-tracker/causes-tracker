services:
  postgres:
    # Pin by digest; update when upgrading pgvector or PostgreSQL.
    # Current: pgvector 0.8.0 on PostgreSQL 17 (bookworm).
    # To update:
    #   docker pull pgvector/pgvector:pg17
    #   docker inspect --format='{{index .RepoDigests 0}}' pgvector/pgvector:pg17
    image: pgvector/pgvector:pg17@sha256:4d015894147ed169e4d2b2e14505cb99333c868e75663f586c217ba786c800d1
    environment:
      POSTGRES_USER: causes
      POSTGRES_PASSWORD: causes
      POSTGRES_DB: causes
    ports:
      - "5432:5432"
    volumes:
      - causes-dev-pg:/var/lib/postgresql/data
  # Build and load the image first:
  #   bazel run //services/causes_api:image_load
  causes-api:
    image: causes-api:latest
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: postgresql://causes:causes@postgres:5432/causes
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY:-}
      HONEYCOMB_ENDPOINT: ${HONEYCOMB_ENDPOINT:-}
    depends_on:
      - postgres
    restart: unless-stopped
volumes:
  causes-dev-pg:
