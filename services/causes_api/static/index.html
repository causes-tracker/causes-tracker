<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Causes</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 40em; margin: 2em auto; padding: 0 1em; }
  h1 { font-size: 1.4em; }
  h2 { font-size: 1.2em; margin-top: 1.5em; }
  .hidden { display: none; }
  code { background: #f0f0f0; padding: 0.2em 0.4em; border-radius: 3px; font-size: 1.2em; }
  button { padding: 0.4em 0.8em; cursor: pointer; margin: 0.2em; }
  input, select { padding: 0.3em; margin: 0.2em; }
  #user-info dt { font-weight: bold; }
  #user-info dd { margin: 0 0 0.5em; }
  .error { color: #c00; }
  .project-item { margin: 0.5em 0; }
  .project-item button { font-size: 0.85em; }
</style>
</head>
<body>
<h1>Causes</h1>

<div id="view-login">
  <p>Sign in to continue.</p>
  <button onclick="startLogin()">Sign in with Google</button>
</div>

<div id="view-device" class="hidden">
  <p>Open <a id="device-url" href="#" target="_blank"></a> and enter this code:</p>
  <p><code id="device-code"></code></p>
  <p id="device-status">Waiting for sign-in...</p>
</div>

<div id="view-app" class="hidden">
  <dl id="user-info"></dl>

  <h2>Projects</h2>
  <div id="project-list"></div>

  <h2>Create project</h2>
  <form onsubmit="createProject(event)">
    <input id="new-project-name" placeholder="project-name" required>
    <input id="new-project-desc" placeholder="Description">
    <select id="new-project-vis">
      <option value="public">Public</option>
      <option value="private">Private</option>
    </select>
    <button type="submit">Create</button>
  </form>

  <p><button onclick="logout()">Sign out</button></p>
</div>

<p id="error" class="error hidden"></p>

<script>
function show(id) {
  for (const v of document.querySelectorAll('[id^="view-"]')) v.classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function startLogin() {
  document.getElementById('error').classList.add('hidden');
  try {
    const resp = await fetch('/auth/login', { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    document.getElementById('device-url').href = data.verification_url;
    document.getElementById('device-url').textContent = data.verification_url;
    document.getElementById('device-code').textContent = data.user_code;
    show('view-device');

    pollLogin(data.nonce, (data.interval_secs || 5) * 1000);
  } catch (e) {
    showError('Login failed: ' + e.message);
  }
}

async function pollLogin(nonce, intervalMs) {
  while (true) {
    await new Promise(r => setTimeout(r, intervalMs));
    try {
      const resp = await fetch('/auth/poll', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nonce }),
      });
      if (!resp.ok) throw new Error(await resp.text());
      const data = await resp.json();
      if (data.status === 'ok') {
        loadApp();
        return;
      }
    } catch (e) {
      showError('Poll failed: ' + e.message);
      show('view-login');
      return;
    }
  }
}

async function loadApp() {
  try {
    const resp = await fetch('/api/whoami');
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    if (!data.logged_in) {
      show('view-login');
      return;
    }

    const dl = document.getElementById('user-info');
    dl.innerHTML = '';
    for (const [key, value] of [['display name', data.display_name], ['email', data.email]]) {
      const dt = document.createElement('dt');
      dt.textContent = key;
      const dd = document.createElement('dd');
      dd.textContent = value;
      dl.append(dt, dd);
    }
    show('view-app');
    loadProjects();
  } catch (e) {
    showError('Failed to load user info: ' + e.message);
  }
}

async function loadProjects() {
  const container = document.getElementById('project-list');
  container.innerHTML = '';
  try {
    const resp = await fetch('/api/projects');
    if (!resp.ok) return;
    const projects = await resp.json();
    if (projects.length === 0) {
      container.innerHTML = '<p>No projects yet.</p>';
      return;
    }
    for (const p of projects) {
      const div = document.createElement('div');
      div.className = 'project-item';
      const label = document.createElement('strong');
      label.textContent = p.name;
      div.appendChild(label);
      if (p.visibility === 'private') {
        div.appendChild(document.createTextNode(' (private)'));
      }
      if (p.description) {
        const desc = document.createElement('span');
        desc.textContent = ' — ' + p.description;
        div.appendChild(desc);
      }

      const renameBtn = document.createElement('button');
      renameBtn.textContent = 'Rename';
      renameBtn.onclick = () => renameProject(p.name);
      div.appendChild(renameBtn);

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.onclick = () => deleteProject(p.name);
      div.appendChild(deleteBtn);

      container.appendChild(div);
    }
  } catch (e) {
    container.innerHTML = '<p>Failed to load projects.</p>';
  }
}

async function createProject(event) {
  event.preventDefault();
  document.getElementById('error').classList.add('hidden');
  const name = document.getElementById('new-project-name').value;
  const description = document.getElementById('new-project-desc').value;
  const visibility = document.getElementById('new-project-vis').value;
  try {
    const resp = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description, visibility }),
    });
    if (!resp.ok) throw new Error(await resp.text());
    document.getElementById('new-project-name').value = '';
    document.getElementById('new-project-desc').value = '';
    loadProjects();
  } catch (e) {
    showError('Create failed: ' + e.message);
  }
}

async function renameProject(currentName) {
  const newName = prompt('New name for ' + currentName + ':');
  if (!newName) return;
  document.getElementById('error').classList.add('hidden');
  try {
    const resp = await fetch('/api/projects/' + encodeURIComponent(currentName), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_name: newName }),
    });
    if (!resp.ok) throw new Error(await resp.text());
    loadProjects();
  } catch (e) {
    showError('Rename failed: ' + e.message);
  }
}

async function deleteProject(name) {
  if (!confirm('Delete project ' + name + '?')) return;
  document.getElementById('error').classList.add('hidden');
  try {
    const resp = await fetch('/api/projects/' + encodeURIComponent(name), {
      method: 'DELETE',
    });
    if (!resp.ok) throw new Error(await resp.text());
    loadProjects();
  } catch (e) {
    showError('Delete failed: ' + e.message);
  }
}

async function logout() {
  await fetch('/auth/logout', { method: 'POST' });
  show('view-login');
}

// On page load, check if already logged in.
loadApp();
</script>
</body>
</html>
